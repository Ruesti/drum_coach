name: drum_coach
description: "Android app for training drum rudiments on a practice pad."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.0
  go_router: ^14.6.2
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  flutter_soloud: ^3.2.0
  fl_chart: ^0.69.0
  path_provider: ^2.1.0
  shared_preferences: ^2.3.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.0
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
